<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

        <link rel="stylesheet" href="./css/components/mensagem-container.css" type="text/css">
        <link rel="stylesheet" href="./css/global.css" type="text/css">
        <link rel="stylesheet" href="./css/components/header.css" type="text/css">
        <link rel="stylesheet" href="./css/components/footer.css" type="text/css">
        <link rel="stylesheet" href="./css/pages/modal-avaliar.css" type="text/css">
        <link rel="stylesheet" href="./css/pages/detalhes-filme.css" type="text/css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

        <link rel="icon" type="image/png" href="assets/icons/favicon.png" />

        <title>Detalhes do Filme</title>
    </head>
    <body>
        <div id="loader">
            <div class="spinner">
                <p>Carregando detalhes do filme...</p>
            </div>
        </div>

        <div id="container" class="inativo-js">
            <div id="header-container"></div>
            <div class="mensagem-container"></div>
            <main>
                <article id="detalhes-filme" class="filme-page-layout">
                    <figure id="poster" class="filme-poster-card">
                        <img src="" alt="Poster do filme">
                    </figure>
                    <section id="detalhes" class="filme-hero-card">
                        <div class="topo-detalhes">
                            <div class="info-filme">
                                <header class="parte1">
                                    <p></p>
                                    <p></p>
                                </header >

                                <section class="parte2">
                                    <ul>
                                        <li></li>
                                    </ul>
                                </section>
                            </div>

                            <button class="btn-remover-filme disable">
                                <i class="fa-solid fa-trash"></i>
                                Remover
                            </button>
                        </div>
                        
                        <section class="parte3-wrapper">
                            <section class="parte3 filme-meta-grid">
                            <div class="diretor">
                                 <span class="meta-label">Diretor</span>
                                 <div class="meta-value-row">
                                     <i class="fa-solid fa-clapperboard"></i>
                                     <p class="nome-diretor"></p>
                                 </div>
                            </div>
                            <div class="duracao">
                                <span class="meta-label">Duração</span>
                                <div class="meta-value-row">
                                    <i class="fa-regular fa-clock"></i>
                                    <p>2h 2m</p>
                                </div>
                            </div>
                            <div class="responsavel">
                                <span class="meta-label">Adicionado por</span>
                                <div class="meta-value-row">
                                    <i class="fa-regular fa-user"></i>
                                    <span class="nome"><a href="" class="link-perfil"></a></span>
                                </div>
                            </div>
                            <div class="data-adicionado">
                                <span class="meta-label">Data de adição</span>
                                <div class="meta-value-row">
                                    <i class="fa-regular fa-calendar"></i>
                                    <p></p>
                                </div>
                            </div>
                            </section>
                        </section>
                    </section >
                    <section id="sinopse" class="filme-section-card">
                        <div class="filme-section-header">
                            <h3 class="fonte-primaria">Sinopse</h3>
                        </div>
                        <p class="fonte-secundaria"></p>
                    </section >
                    <section id="avaliacao" class="filme-section-card filme-avaliacao-card">
                        <div class="filme-section-header filme-section-header-inline">
                            <h3 class="filme-avaliacao-title">Avaliações</h3>
                            <span class="filme-section-divider"></span>
                        </div>
                        <section id="botao-avaliar" class="filme-avaliacao-cta">
                            <button type="button"></button>
                        </section>
                        <section id="minha-avaliacao" class="inativo">
                            <h3>Sua avaliação</h3>
                            <div>
                                <span></span>
                            </div>
                        </section>
                        <section id="avaliacoes">
                            <div>
                                <span></span>
                            </div>
                        </section>
                        <section id="avaliacoes-recebidas">
                            <h3></h3>
                            <ul></ul>
                        </section>
                    </section>
                </article >
                <div id="modal-avaliar" class="modal inativo">
                    <div class="modal-content">
                        <h3>Como você avalia este filme?</h3>
                        <span>Escolha uma das opções abaixo</span>
                        <span class="close">&times;</span>
                        <div id="opcoes-voto">
                            <ul></ul>
                        </div>
                    </div>
                </div>
            </main>
            <div id="footer-container"></div>
            </div>

            <script type="module" src="./js/include.js"></script>
            <script type="module" src="./js/pages/detalhes-filme.js"></script>
    </body>
</html>
