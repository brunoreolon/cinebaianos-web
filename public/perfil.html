<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="./css/components/mensagem-container.css" type="text/css">
        <link rel="stylesheet" href="./css/global.css" type="text/css">
        <link rel="stylesheet" href="./css/components/header.css" type="text/css">
        <link rel="stylesheet" href="./css/components/footer.css" type="text/css">
        <link rel="stylesheet" href="./css/pages/modal-avaliar.css" type="text/css">
        <link rel="stylesheet" href="./css/pages/perfil.css" type="text/css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

        <link rel="icon" type="image/png" href="assets/icons/favicon.png" />

        <title>Perfil</title>
    </head>
    <body>
        <div id="loader">
            <div class="spinner">
                <p>Carregando perfil...</p>
            </div>
        </div>

        <div id="container" class="inativo-js">
            <div id="header-container"></div>
            <div class="mensagem-container"></div>

            <main class="perfil-page">

                <!-- Hero: dados do usuário + stats -->
                <section id="painel-usuario">

                    <!-- Avatar + nome + bio + meta linhas -->
                    <div id="dados-usuario"></div>

                    <!-- Votos recebidos -->
                    <div id="votos-recebidos">
                        <div class="separator"></div>
                        <div class="perfil-secao-header">
                            <div class="perfil-secao-titulo-linha">
                                <i class="fa-solid fa-award perfil-icone-award"></i>
                                <h3 class="perfil-secao-titulo">Votos Recebidos</h3>
                            </div>
                            <p id="votos-recebidos-contexto" class="perfil-secao-subtitulo"></p>
                        </div>
                        <div id="dados-votos"></div>
                    </div>

                    <!-- Estatísticas de filmes -->
                    <div id="dados-filmes-wrapper">
                        <div class="separator"></div>
                        <div class="perfil-secao-header">
                            <div class="perfil-secao-titulo-linha">
                                <i class="fa-solid fa-film perfil-icone-filme"></i>
                                <h3 class="perfil-secao-titulo">Atividade no Grupo</h3>
                            </div>
                        </div>
                        <div id="dados-filmes"></div>
                    </div>

                </section>

                <!-- Abas de filmes -->
                <section id="abas">
                    <div id="menu-mobile">
                        <button id="menu-toggle">
                            <i class="fa-solid fa-filter"></i>
                            <span>Filtrar</span>
                        </button>
                        <ul id="lista"></ul>
                    </div>
                </section>

                <!-- Grid de filmes -->
                <section id="filmes">
                    <div class="inline"></div>
                </section>

            </main>
            <div id="footer-container"></div>
        </div>

        <div id="modal-avaliar" class="modal inativo">
            <div class="modal-content">
                <h3>Como você avalia este filme?</h3>
                <span>Escolha uma das opções abaixo</span>
                <span class="close">&times;</span>
                <div id="opcoes-voto">
                    <ul></ul>
                </div>
            </div>
        </div>

        <script type="module" src="./js/include.js"></script>
        <script type="module" src="./js/pages/perfil.js"></script>
    </body>
</html>
